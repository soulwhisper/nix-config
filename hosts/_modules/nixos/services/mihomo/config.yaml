---
# based-on:https://github.com/yyhhyyyyyy/selfproxy/blob/main/Mihomo/mihomo_multi.yaml
# ref:https://blog.skk.moe/post/i-have-my-unique-surge-setup/

# : provider
proxy-providers:
  provider1:
    url: "$SUBSCRIPTION"
    type: http
    interval: 86400
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[provider1]"

# : global
mixed-port: 1080
# tproxy-port: 7890
# routing-mark: 6666
ipv6: true
allow-lan: true
bind-address: "*"
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128
mode: rule
find-process-mode: strict
unified-delay: true
global-client-fingerprint: chrome
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true

# ui = http://{{external-controller}}/ui
external-controller: 0.0.0.0:9201

# : dns; adguard->mihomo; adguard no cache;
dns:
  enable: true
  prefer-h3: false
  listen: :5300
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.homelab.internal"
    - "+.noirprime.com"
    # api
    - "+.api.letsencrypt.org"
    - "+.argotunnel.com"
    - "+.m.daocloud.io"
    # ntp
    - "time.*.com"
    - "ntp.*.com"
    - "+.pool.ntp.org"
  nameserver:
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query

# : sniffer
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443]
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.apple.com
    - +.oray.com
    - +.sunlogin.net
    - +.push.apple.com

# : tun
tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  mtu: 1500

# : 节点筛选
# :: 按地区筛选
FilterHK: &FilterHK '^(?=.*((?i)🇭🇰|香港|\b(HK|Hong)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterTW: &FilterTW '^(?=.*((?i)🇹🇼|台湾|\b(TW|Tai|Taiwan)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterJP: &FilterJP '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\b(JP|Japan)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterKR: &FilterKR '^(?=.*((?i)🇰🇷|韩国|韓|首尔|\b(KR|Korea)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterSG: &FilterSG '^(?=.*((?i)🇸🇬|新加坡|狮|\b(SG|Singapore)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterUS: &FilterUS '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|United States)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterUK: &FilterUK '^(?=.*((?i)🇬🇧|英国|伦敦|\b(UK|United Kingdom)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterFR: &FilterFR '^(?=.*((?i)🇫🇷|法国|\b(FR|France)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterDE: &FilterDE '^(?=.*((?i)🇩🇪|德国|\b(DE|Germany)(\d+)?\b))(?!.*((?i)回国|校园|网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点)).*$'
FilterOthers: &FilterOthers "^(?!.*(🇭🇰|HK|Hong|香港|🇹🇼|TW|Taiwan|Wan|🇯🇵|JP|Japan|日本|🇸🇬|SG|Singapore|狮城|🇺🇸|US|United States|America|美国|🇩🇪|DE|Germany|德国|🇬🇧|UK|United Kingdom|英国|🇰🇷|KR|Korea|韩国|韓|🇫🇷|FR|France|法国)).*$"
FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)\b|(\d{4}-\d{2}-\d{2}|\d+G)))).*$'

# : 策略组基础设置
# :: 手动选择
Select:
  &Select {
    type: select,
    url: "http://connectivitycheck.platform.hicloud.com/generate_204",
    disable-udp: false,
    hidden: false,
    include-all: true,
  }
# :: 自动选择 [每 300 秒一次惰性健康检查，容差 50ms，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
UrlTest:
  &UrlTest {
    type: url-test,
    url: "http://connectivitycheck.platform.hicloud.com/generate_204",
    interval: 300,
    lazy: true,
    tolerance: 50,
    timeout: 2000,
    disable-udp: false,
    max-failed-times: 3,
    hidden: true,
    include-all: true,
  }
# :: 自动回退 [每 300 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
FallBack:
  &FallBack {
    type: fallback,
    url: "http://connectivitycheck.platform.hicloud.com/generate_204",
    interval: 300,
    lazy: true,
    timeout: 2000,
    disable-udp: false,
    max-failed-times: 3,
    hidden: true,
    include-all: true,
  }
# :: 负载均衡 [每 300 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance:
  &LoadBalance {
    type: load-balance,
    url: "http://connectivitycheck.platform.hicloud.com/generate_204",
    interval: 300,
    lazy: true,
    disable-udp: false,
    strategy: consistent-hashing,
    timeout: 2000,
    max-failed-times: 3,
    hidden: true,
    include-all: true,
  }

# : 策略组
proxy-groups:
  # :: 主选择组
  - {
      name: 节点选择,
      type: select,
      proxies: [智能选择, 手动选择, DIRECT],
      url: http://connectivitycheck.platform.hicloud.com/generate_204,
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Static.png,
    }

  # :: 手动/Auto
  - {
      name: 手动选择,
      type: select,
      proxies:
        [
          🇭🇰 - 手动选择,
          🇯🇵 - 手动选择,
          🇰🇷 - 手动选择,
          🇸🇬 - 手动选择,
          🇺🇸 - 手动选择,
          🇬🇧 - 手动选择,
          🇫🇷 - 手动选择,
          🇩🇪 - 手动选择,
          🇹🇼 - 手动选择,
          Others - 手动选择,
        ],
      url: http://connectivitycheck.platform.hicloud.com/generate_204,
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Cylink.png,
    }
  - {
      name: 智能选择,
      type: select,
      proxies:
        [
          🇭🇰 - Auto,
          🇯🇵 - Auto,
          🇰🇷 - Auto,
          🇸🇬 - Auto,
          🇺🇸 - Auto,
          🇬🇧 - Auto,
          🇫🇷 - Auto,
          🇩🇪 - Auto,
          🇹🇼 - Auto,
        ],
      url: http://connectivitycheck.platform.hicloud.com/generate_204,
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png,
    }

  # :: 应用分组
  - {
      name: 电报信息,
      type: select,
      proxies: [节点选择, 🇭🇰 - Auto, 🇯🇵 - Auto, 🇸🇬 - Auto, 🇺🇸 - Auto],
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png,
    }
  - {
      name: AIGC,
      type: select,
      proxies: [🇺🇸 - Auto, 节点选择, 🇭🇰 - Auto, 🇯🇵 - Auto, 🇸🇬 - Auto],
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png,
    }
  - {
      name: 苹果服务,
      type: select,
      proxies: [DIRECT, 节点选择, 🇭🇰 - Auto, 🇺🇸 - Auto],
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Apple.png,
    }
  - {
      name: 微软服务,
      type: select,
      proxies: [DIRECT, 节点选择, 🇭🇰 - Auto, 🇺🇸 - Auto],
      icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Microsoft.png,
    }

  # :: Auto
  - {
      name: 🇭🇰 - Auto,
      type: select,
      proxies: [🇭🇰 - 自动选择, 🇭🇰 - 自动回退, 🇭🇰 - 负载均衡],
    }
  - {
      name: 🇯🇵 - Auto,
      type: select,
      proxies: [🇯🇵 - 自动选择, 🇯🇵 - 自动回退, 🇯🇵 - 负载均衡],
    }
  - {
      name: 🇰🇷 - Auto,
      type: select,
      proxies: [🇰🇷 - 自动选择, 🇰🇷 - 自动回退, 🇰🇷 - 负载均衡],
    }
  - {
      name: 🇸🇬 - Auto,
      type: select,
      proxies: [🇸🇬 - 自动选择, 🇸🇬 - 自动回退, 🇸🇬 - 负载均衡],
    }
  - {
      name: 🇺🇸 - Auto,
      type: select,
      proxies: [🇺🇸 - 自动选择, 🇺🇸 - 自动回退, 🇺🇸 - 负载均衡],
    }
  - {
      name: 🇬🇧 - Auto,
      type: select,
      proxies: [🇬🇧 - 自动选择, 🇬🇧 - 自动回退, 🇬🇧 - 负载均衡],
    }
  - {
      name: 🇫🇷 - Auto,
      type: select,
      proxies: [🇫🇷 - 自动选择, 🇫🇷 - 自动回退, 🇫🇷 - 负载均衡],
    }
  - {
      name: 🇩🇪 - Auto,
      type: select,
      proxies: [🇩🇪 - 自动选择, 🇩🇪 - 自动回退, 🇩🇪 - 负载均衡],
    }
  - {
      name: 🇹🇼 - Auto,
      type: select,
      proxies: [🇹🇼 - 自动选择, 🇹🇼 - 自动回退, 🇹🇼 - 负载均衡],
    }

  # :: 自动选择 - 按地区
  - { name: 🇭🇰 - 自动选择, <<: *UrlTest, filter: *FilterHK }
  - { name: 🇯🇵 - 自动选择, <<: *UrlTest, filter: *FilterJP }
  - { name: 🇰🇷 - 自动选择, <<: *UrlTest, filter: *FilterKR }
  - { name: 🇸🇬 - 自动选择, <<: *UrlTest, filter: *FilterSG }
  - { name: 🇺🇸 - 自动选择, <<: *UrlTest, filter: *FilterUS }
  - { name: 🇬🇧 - 自动选择, <<: *UrlTest, filter: *FilterUK }
  - { name: 🇫🇷 - 自动选择, <<: *UrlTest, filter: *FilterFR }
  - { name: 🇩🇪 - 自动选择, <<: *UrlTest, filter: *FilterDE }
  - { name: 🇹🇼 - 自动选择, <<: *UrlTest, filter: *FilterTW }

  # :: 自动回退 - 按地区
  - { name: 🇭🇰 - 自动回退, <<: *FallBack, filter: *FilterHK }
  - { name: 🇯🇵 - 自动回退, <<: *FallBack, filter: *FilterJP }
  - { name: 🇰🇷 - 自动回退, <<: *FallBack, filter: *FilterKR }
  - { name: 🇸🇬 - 自动回退, <<: *FallBack, filter: *FilterSG }
  - { name: 🇺🇸 - 自动回退, <<: *FallBack, filter: *FilterUS }
  - { name: 🇬🇧 - 自动回退, <<: *FallBack, filter: *FilterUK }
  - { name: 🇫🇷 - 自动回退, <<: *FallBack, filter: *FilterFR }
  - { name: 🇩🇪 - 自动回退, <<: *FallBack, filter: *FilterDE }
  - { name: 🇹🇼 - 自动回退, <<: *FallBack, filter: *FilterTW }

  # :: 负载均衡 - 按地区
  - { name: 🇭🇰 - 负载均衡, <<: *LoadBalance, filter: *FilterHK }
  - { name: 🇯🇵 - 负载均衡, <<: *LoadBalance, filter: *FilterJP }
  - { name: 🇰🇷 - 负载均衡, <<: *LoadBalance, filter: *FilterKR }
  - { name: 🇸🇬 - 负载均衡, <<: *LoadBalance, filter: *FilterSG }
  - { name: 🇺🇸 - 负载均衡, <<: *LoadBalance, filter: *FilterUS }
  - { name: 🇬🇧 - 负载均衡, <<: *LoadBalance, filter: *FilterUK }
  - { name: 🇫🇷 - 负载均衡, <<: *LoadBalance, filter: *FilterFR }
  - { name: 🇩🇪 - 负载均衡, <<: *LoadBalance, filter: *FilterDE }
  - { name: 🇹🇼 - 负载均衡, <<: *LoadBalance, filter: *FilterTW }

  # :: 手动选择 - 按地区
  - { name: 🇭🇰 - 手动选择, <<: *Select, filter: *FilterHK }
  - { name: 🇯🇵 - 手动选择, <<: *Select, filter: *FilterJP }
  - { name: 🇰🇷 - 手动选择, <<: *Select, filter: *FilterKR }
  - { name: 🇸🇬 - 手动选择, <<: *Select, filter: *FilterSG }
  - { name: 🇺🇸 - 手动选择, <<: *Select, filter: *FilterUS }
  - { name: 🇬🇧 - 手动选择, <<: *Select, filter: *FilterUK }
  - { name: 🇫🇷 - 手动选择, <<: *Select, filter: *FilterFR }
  - { name: 🇩🇪 - 手动选择, <<: *Select, filter: *FilterDE }
  - { name: 🇹🇼 - 手动选择, <<: *Select, filter: *FilterTW }
  - { name: Others - 手动选择, <<: *Select, filter: *FilterOthers }

# : 规则配置
RuleSet_classical:
  &RuleSet_classical {
    type: http,
    behavior: classical,
    interval: 43200,
    format: text,
    proxy: 节点选择,
  }
RuleSet_domain:
  &RuleSet_domain {
    type: http,
    behavior: domain,
    interval: 43200,
    format: text,
    proxy: 节点选择,
  }
RuleSet_ipcidr:
  &RuleSet_ipcidr {
    type: http,
    behavior: ipcidr,
    interval: 43200,
    format: text,
    proxy: 节点选择,
  }

