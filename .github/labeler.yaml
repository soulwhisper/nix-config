---
area/nix:
  - changed-files:
      - any-glob-to-any-file:
          - "hosts/**/*"
          - "lib/**/*"
          - "overlays/**/*"
          - "flake.nix"
          - "flake.lock"
          - "nixpkgs.nix"
          - ".sops.yaml"
area/hm:
  - changed-files:
      - any-glob-to-any-file:
          - "homes/**/*"
area/pkgs:
  - changed-files:
      - any-glob-to-any-file:
          - "pkgs/**/*"
area/bootstrap:
  - changed-files:
      - any-glob-to-any-file:
          - "bootstrap/**/*"
area/docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**/*"
          - "README.md"
area/github:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"
          - ".editorconfig"
          - ".gitatttributes"
          - ".gitignore"
area/renovate:
  - changed-files:
      - any-glob-to-any-file:
          - ".renovate/**/*"
          - "renovate.json5"
area/taskfile:
  - changed-files:
      - any-glob-to-any-file:
          - ".justfiles/**/*"
          - "justfile"
