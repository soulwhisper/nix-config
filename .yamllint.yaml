---
# https://yamllint.readthedocs.io/en/stable/
extends: default

ignore: |
  *.sops.yaml
  *.sops.yml

rules:
  comments:
    require-starting-space: false
    min-spaces-from-content: 1
  indentation:
    spaces: 2
  line-length: disable
  quoted-strings:
    quote-type: consistent
    required: false
